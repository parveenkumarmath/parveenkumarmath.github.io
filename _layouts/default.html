<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ site.title }}</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    line-height:1.7;
    color:#222;
    background:#fff;
}

.navbar{
    background:#0f4c81;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
}

.navbar a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.navbar a:hover{
    text-decoration:underline;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:40px;
}

.info{
    flex:1;
    min-width:300px;
}

.info h1{
    font-size:42px;
    margin-bottom:5px;
    color:#0f4c81;
}

.info p{
    font-size:20px;
    color:#555;
}

.photo img{
    width:220px;
    height:220px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #0f4c81;
}

section{
    margin-top:60px;
}

h2{
    color:#0f4c81;
    border-bottom:2px solid #ddd;
    padding-bottom:8px;
}

html{
    scroll-behavior:smooth;
}

</style>
</head>

<body>

<div class="navbar">
<a href="#home">Home</a>
<a href="#research">Research</a>
<a href="#publications">Publications</a>
<a href="#education">Education</a>
<a href="#conference">Conferences</a>
<a href="#contact">Contact</a>
</div>

<div class="container">
{{ content }}
</div>

</body>
</html>
