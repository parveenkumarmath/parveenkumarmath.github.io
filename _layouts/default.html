<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>

<style>
body{
  margin:0;
  font-family: "Segoe UI", Arial, sans-serif;
  display:flex;
  background:#fff;
  color:#111;
}

/* SIDEBAR */
.sidebar{
  width:300px;
  height:100vh;
  position:fixed;
  background:#f7f7f7;
  padding:40px 20px;
  text-align:center;
  border-right:1px solid #ddd;
}

.sidebar img{
  width:140px;
  height:140px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

.sidebar a{
  display:block;
  margin-top:10px;
  color:#0f4c81;
  text-decoration:none;
}

/* MAIN */
.main{
  margin-left:300px;
  padding:50px;
  max-width:900px;
}

h1,h2{
  color:#0f4c81;
  border-bottom:1px solid #eee;
  padding-bottom:5px;
}

section{
  margin-bottom:25px;
  line-height:1.7;
}

.small{
  color:#666;
  font-size:14px;
}

/* RESPONSIVE */
@media(max-width:768px){
  body{flex-direction:column;}
  .sidebar{
    position:relative;
    width:100%;
    height:auto;
  }
  .main{
    margin-left:0;
    padding:20px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="parveen.jpeg">

  <h3>Parveen Kumar</h3>
  <p>Research Scholar</p>
  <p>IIT Ropar</p>

  <a href="mailto:PSWAMIFCA@GMAIL.COM">Email</a>
  <a href="https://scholar.google.com/citations?user=jWAKMYUAAAAJ&hl=en">Google Scholar</a>
  <a href="https://orcid.org/0009-0004-3400-0292">ORCID</a>
  <a href="https://www.researchgate.net/profile/Parveen-Kumar-108">ResearchGate</a>
</div>

<!-- CONTENT -->
<div class="main">
{{ content }}
</div>

</body>
</html>
